const STORAGE_KEY = "artist_hq_data";

async function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  try {
    await fetch(SB_URL + "/rest/v1/artist_hq", {
      method: "POST", headers: SB_HDR,
      body: JSON.stringify({ id: 1, data: JSON.stringify(data), updated_at: new Date().toISOString() })
    });
  } catch(e) { console.warn("Supabase save error:", e); throw e; }
}

async function loadData() {
  try {
    const res = await fetch(SB_URL + "/rest/v1/artist_hq?id=eq.1&select=data", { headers: SB_HDR });
    if (res.ok) {
      const rows = await res.json();
      if (rows && rows[0] && rows[0].data && rows[0].data !== "{}") return JSON.parse(rows[0].data);
    }
  } catch(e) { console.warn("Supabase load error:", e); }
  const local = localStorage.getItem(STORAGE_KEY);
  return local ? JSON.parse(local) : null;
}

function Modal({section,item,onSave,onDelete,onClose}) {
  const [d,setD] = useState({...item});
  const fields = FIELDS[section]||[];
  const set = (k,v) => setD(p=>({...p,[k]:v}));
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:T.surf,border:`2px solid ${T.accent}55`,borderRadius:"16px",padding:"28px",width:"540px",maxWidth:"95vw",maxHeight:"88vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"22px"}}>
          <div style={{fontSize:"16px",fontWeight:800,color:T.accent}}>✏️ Bearbeiten</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:T.muted2,fontSize:"24px",cursor:"pointer"}}>×</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px",marginBottom:"22px"}}>
          {fields.map(f=>(
            <div key={f.k} style={{gridColumn:f.wide?"1 / -1":"auto"}}>
              <div style={{fontSize:"11px",color:T.muted2,marginBottom:"5px",letterSpacing:"1px",textTransform:"uppercase"}}>{f.label}</div>
              {f.t==="sel"
                ? <Sel value={d[f.k]??""} onChange={e=>set(f.k,e.target.value)}>{f.opts.map(o=><option key={o} value={o}>{o}</option>)}</Sel>
                : <Inp type={f.t} value={d[f.k]??""} onChange={e=>set(f.k,f.t==="number"?Number(e.target.value):e.target.value)}/>
              }
            </div>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between"}}>
          <Btn color="red" onClick={()=>{onDelete(item.id);onClose();}}>🗑 Löschen</Btn>
          <div style={{display:"flex",gap:"8px"}}>
            <Btn color="ghost" onClick={onClose}>Abbrechen</Btn>
            <Btn onClick={()=>{onSave(d);onClose();}}>Speichern</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [data,setData] = useState(INIT);
  const [tab,setTab]   = useState("overview");
  const [modal,setModal] = useState(null);
  const [adding,setAdding] = useState(null);
  const [taskFilter,setTaskFilter] = useState("open");
  const [editArtist,setEditArtist] = useState(false);
  const [artistDraft,setArtistDraft] = useState(INIT.artist);
  const [saveStatus,setSaveStatus] = useState(""); // "", "saving", "saved", "error"
  const [dbReady,setDbReady] = useState(false);

  // Load data on mount
  useEffect(() => {
    loadData().then(saved => {
      if (saved) setData(saved);
      setDbReady(true);
    });
  }, []);

  // Auto-save whenever data changes (debounced 800ms)
  useEffect(() => {
    if (!dbReady) return;
    setSaveStatus("saving");
    const t = setTimeout(() => {
      saveData(data)
        .then(() => setSaveStatus("saved"))
        .catch(() => setSaveStatus("error"));
    }, 800);
    return () => clearTimeout(t);
  }, [data, dbReady]);

  const updList = (key,fn) => setData(d=>({...d,[key]:fn(d[key])}));
  const saveItem = (section,draft) => {
    if(section==="finanzen_ein") setData(d=>({...d,finanzen:{...d.finanzen,einnahmen:d.finanzen.einnahmen.map(x=>x.id===draft.id?draft:x)}}));
    else if(section==="finanzen_aus") setData(d=>({...d,finanzen:{...d.finanzen,ausgaben:d.finanzen.ausgaben.map(x=>x.id===draft.id?draft:x)}}));
    else updList(section,arr=>arr.map(x=>x.id===draft.id?draft:x));
  };
  const delItem = (section,id) => {
    if(section==="finanzen_ein") setData(d=>({...d,finanzen:{...d.finanzen,einnahmen:d.finanzen.einnahmen.filter(x=>x.id!==id)}}));
    else if(section==="finanzen_aus") setData(d=>({...d,finanzen:{...d.finanzen,ausgaben:d.finanzen.ausgaben.filter(x=>x.id!==id)}}));
    else updList(section,arr=>arr.filter(x=>x.id!==id));
  };
  const addItem = (section,item) => {
    if(section==="finanzen_ein") setData(d=>({...d,finanzen:{...d.finanzen,einnahmen:[...d.finanzen.einnahmen,item]}}));
    else if(section==="finanzen_aus") setData(d=>({...d,finanzen:{...d.finanzen,ausgaben:[...d.finanzen.ausgaben,item]}}));
    else updList(section,arr=>[...arr,item]);
    setAdding(null);
  };
  const toggleTask = id => updList("tasks",arr=>arr.map(t=>t.id===id?{...t,done:!t.done}:t));
  const setZP = (id,v) => updList("ziele",arr=>arr.map(z=>z.id===id?{...z,progress:Number(v)}:z));
  const openModal = (section,item) => setModal({section,item});

  const totalEin = data.finanzen.einnahmen.reduce((s,e)=>s+e.betrag,0);
  const totalAus = data.finanzen.ausgaben.reduce((s,e)=>s+e.betrag,0);
  const eventFees = data.events.filter(e=>e.fee>0 && e.status!=="cancelled");
  const eventFeesConfirmed = eventFees.filter(e=>e.status==="confirmed").reduce((s,e)=>s+Number(e.fee),0);
  const eventFeesPending   = eventFees.filter(e=>e.status!=="confirmed").reduce((s,e)=>s+Number(e.fee),0);
  const releaseBudgets = data.releases.filter(r=>r.status!=="released" && r.budget>0);
  const budgetBlocked  = releaseBudgets.reduce((s,r)=>s+Number(r.budget),0);

  const card = {background:T.surf,border:`1px solid ${T.border}`,borderRadius:"12px",padding:"20px"};
  const g2 = {display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px"};
  const g3 = {display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"16px"};
  const g4 = {display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"14px"};
  const secTitle = {fontSize:"11px",letterSpacing:"3px",color:T.muted2,textTransform:"uppercase",fontWeight:700,marginBottom:"14px"};
  const rowDiv = {display:"flex",alignItems:"center",gap:"12px",padding:"10px 0",borderBottom:`1px solid ${T.border}`};

  const SectionHeader = ({title,section}) => (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px"}}>
      <h2 style={{margin:0,fontSize:"18px",fontWeight:900}}>{title}</h2>
      <Btn onClick={()=>setAdding(section)}>+ Hinzufügen</Btn>
    </div>
  );
  const FilterBtns = ({value,onChange}) => (
    <div style={{display:"flex",gap:"5px"}}>
      {[["open","Offen"],["done","Erledigt"],["all","Alle"]].map(([v,l])=>(
        <button key={v} onClick={()=>onChange(v)} style={{background:value===v?T.accent:"transparent",color:value===v?"#000":T.muted2,border:`1px solid ${value===v?T.accent:T.border}`,padding:"4px 10px",borderRadius:"6px",cursor:"pointer",fontSize:"11px",fontWeight:700}}>{l}</button>
      ))}
    </div>
  );

  return (
    <div style={{background:T.bg,minHeight:"100vh"}}>
      {modal && <Modal section={modal.section} item={modal.item} onSave={d=>saveItem(modal.section,d)} onDelete={id=>delItem(modal.section,id)} onClose={()=>setModal(null)}/>}

      {/* Header */}
      <div style={{background:T.surf,borderBottom:`1px solid ${T.border}`,padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
            <div style={{fontSize:"10px",letterSpacing:"4px",color:T.accent,fontWeight:700}}>ARTIST HQ</div>
            {saveStatus==="saving" && <span style={{fontSize:"10px",color:T.muted2}}>⏳ speichert...</span>}
            {saveStatus==="saved"  && <span style={{fontSize:"10px",color:"#88CC00"}}>✓ gespeichert{supabaseReady?" in Supabase":" (lokal)"}</span>}
            {saveStatus==="error"  && <span style={{fontSize:"10px",color:T.red}}>⚠ Fehler beim Speichern</span>}
            {!supabaseReady && dbReady && <span style={{fontSize:"10px",background:"#FFB80022",color:T.yellow,padding:"2px 8px",borderRadius:"4px"}}>⚠ Supabase nicht verbunden – Daten nur lokal</span>}
          </div>
          {editArtist?(
            <div style={{display:"flex",gap:"8px",marginTop:"6px",flexWrap:"wrap"}}>
              {[["name","Name"],["genre","Genre"],["label","Label"],["listeners","Listeners"],["followers","Follower"],["streams","Streams"]].map(([k,ph])=>(
                <Inp key={k} style={{width:"110px"}} placeholder={ph} value={artistDraft[k]} onChange={e=>setArtistDraft(d=>({...d,[k]:e.target.value}))}/>
              ))}
              <Btn onClick={()=>{setData(d=>({...d,artist:artistDraft}));setEditArtist(false);}}>Save</Btn>
              <Btn color="ghost" onClick={()=>setEditArtist(false)}>✕</Btn>
            </div>
          ):(
            <>
              <div style={{fontSize:"22px",fontWeight:900,letterSpacing:"-1px"}}>{data.artist.name}</div>
              <div style={{fontSize:"12px",color:T.muted2,marginTop:"2px"}}>{data.artist.genre} · {data.artist.label}</div>
            </>
          )}
        </div>
        <div style={{display:"flex",gap:"24px",alignItems:"center"}}>
          {[["Streams","streams"],["Listeners","listeners"],["Follower","followers"]].map(([l,k])=>(
            <div key={k} style={{textAlign:"center"}}>
              <div style={{fontSize:"11px",color:T.muted2}}>{l}</div>
              <div style={{fontSize:"18px",fontWeight:800,color:T.accent}}>{data.artist[k]}</div>
            </div>
          ))}
          {!editArtist&&<Btn color="ghost" onClick={()=>{setArtistDraft(data.artist);setEditArtist(true);}} style={{fontSize:"12px",padding:"6px 12px"}}>✏️ Edit</Btn>}
        </div>
      </div>

      {/* Nav */}
      <div style={{background:T.surf,borderBottom:`1px solid ${T.border}`,padding:"0 20px",display:"flex",overflowX:"auto"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"13px 15px",fontSize:"12px",fontWeight:tab===t.id?700:400,color:tab===t.id?T.accent:T.muted2,background:"none",border:"none",borderBottom:`2px solid ${tab===t.id?T.accent:"transparent"}`,cursor:"pointer",whiteSpace:"nowrap"}}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      <div style={{padding:"22px 24px",maxWidth:"1280px",margin:"0 auto"}}>

        {/* OVERVIEW */}
        {tab==="overview"&&(
          <div style={{display:"flex",flexDirection:"column",gap:"18px"}}>
            <div style={g4}>
              {[{l:"Offene Tasks",v:data.tasks.filter(t=>!t.done).length},{l:"Netto",v:`€${totalEin-totalAus}`},{l:"Aktive Releases",v:data.releases.filter(r=>r.status!=="released").length},{l:"Events",v:data.events.length}].map(x=>(
                <div key={x.l} style={card}><div style={{fontSize:"11px",color:T.muted2,marginBottom:"6px"}}>{x.l}</div><div style={{fontSize:"30px",fontWeight:900,color:T.accent,letterSpacing:"-1px"}}>{x.v}</div></div>
              ))}
            </div>
            <div style={g2}>
              <div style={card}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                  <div style={secTitle}>🔥 Tasks</div>
                  <FilterBtns value={taskFilter} onChange={setTaskFilter}/>
                </div>
                {data.tasks.filter(t=>taskFilter==="open"?!t.done:taskFilter==="done"?t.done:true).map(t=>(
                  <div key={t.id} style={rowDiv}>
                    <input type="checkbox" checked={t.done} onChange={()=>toggleTask(t.id)} style={{width:"16px",height:"16px",cursor:"pointer",flexShrink:0}}/>
                    <div style={{flex:1,fontSize:"13px",textDecoration:t.done?"line-through":"none",color:t.done?T.muted:T.text}}>{t.task}</div>
                    <Badge v={t.priority} c={PRIO_C[t.priority]}/>
                  </div>
                ))}
              </div>
              <div style={card}>
                <div style={secTitle}>📅 Nächste Events</div>
                {data.events.sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,5).map(e=>(
                  <EditableRow key={e.id} onEdit={()=>openModal("events",e)}>
                    <div style={{flex:1}}><div style={{fontSize:"13px",fontWeight:600}}>{e.name}</div><div style={{fontSize:"11px",color:T.muted2}}>{e.venue} · {e.date}</div></div>
                    <Badge v={e.status} c={STATUS_C[e.status]}/>
                  </EditableRow>
                ))}
              </div>
            </div>
            <div style={g2}>
              <div style={card}>
                <div style={secTitle}>🎯 Pitching</div>
                {data.pitching.slice(0,4).map(p=>(
                  <EditableRow key={p.id} onEdit={()=>openModal("pitching",p)}>
                    <div style={{flex:1}}><div style={{fontSize:"13px",fontWeight:600}}>{p.target}</div><div style={{fontSize:"11px",color:T.muted2}}>{p.type} · {p.release}</div></div>

                  </EditableRow>

              <div style={card}>
                <div style={secTitle}>🏆 Ziele</div>
                {data.ziele.filter(z=>z.priority==="high").map(z=>(

                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}>
                      <span style={{fontSize:"13px",fontWeight:600}}>{z.ziel}</span>
                      <span style={{fontSize:"13px",color:T.accent,fontWeight:700}}>{z.progress}%</span>
                    </div>
                    <PBar pct={z.progress}/>
                  </div>
                ))}
              </div>
            </div>
            <div style={card}>
              <div style={secTitle}>💶 Finanzen</div>
              <div style={g3}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"14px"}}>
                  {[
                    {l:"Einnahmen (real)",v:totalEin,c:T.accent},
                    {l:"Erwartet (bestätigt)",v:eventFeesConfirmed,c:"#88CC00"},
                    {l:"Erwartet (ausstehend)",v:eventFeesPending,c:T.yellow},
                    {l:"Ausgaben (real)",v:totalAus,c:T.red},
                    {l:"Budget geblockt",v:budgetBlocked,c:"#FF884422".slice(0,-2)},
                  ].map(x=>(
                    <div key={x.l}><div style={{fontSize:"10px",color:T.muted2,marginBottom:"4px"}}>{x.l}</div><div style={{fontSize:"20px",fontWeight:900,color:x.c}}>€{x.v}</div></div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* RELEASES */}
        {tab==="releases"&&(
          <div>
            <SectionHeader title="Release Plan" section="releases"/>
            {adding==="releases"&&<AddForm section="releases" defaults={DEFAULTS.releases} onSave={item=>addItem("releases",item)} onCancel={()=>setAdding(null)}/>}
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              {data.releases.map(r=>(
                <EditableCard key={r.id} onEdit={()=>openModal("releases",r)}>
                  <div style={{display:"flex",alignItems:"center",gap:"16px",paddingRight:"80px"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"17px",fontWeight:900}}>{r.title}</div>
                      <div style={{fontSize:"12px",color:T.muted2,marginTop:"3px"}}>{r.type} · {r.releaseDate} · {r.distributor}</div>
                      <div style={{fontSize:"13px",color:T.muted2,marginTop:"4px"}}>{r.notes}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <Badge v={r.status} c={STATUS_C[r.status]}/>
                      <div style={{fontSize:"14px",color:T.accent,fontWeight:700,marginTop:"6px"}}>€{r.budget}</div>
                    </div>
                  </div>
                </EditableCard>
              ))}
            </div>
          </div>
        )}

        {/* CONTENT */}
        {tab==="content"&&(
          <div>
            <SectionHeader title="Content Kalender" section="content"/>
            {adding==="content"&&<AddForm section="content" defaults={DEFAULTS.content} onSave={item=>addItem("content",item)} onCancel={()=>setAdding(null)}/>}
            <div style={g2}>
              {data.content.sort((a,b)=>new Date(a.date)-new Date(b.date)).map(c=>(
                <EditableCard key={c.id} onEdit={()=>openModal("content",c)}>
                  <div style={{paddingRight:"80px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:"8px"}}>
                      <span style={{fontSize:"12px",fontWeight:700,color:T.accent}}>{c.platform} · {c.type}</span>
                      <Badge v={c.status} c={STATUS_C[c.status]}/>
                    </div>
                    <div style={{fontSize:"15px",fontWeight:700}}>{c.caption}</div>
                    {c.hook&&<div style={{fontSize:"12px",color:T.muted2,marginTop:"6px",fontStyle:"italic"}}>"{c.hook}"</div>}
                    <div style={{fontSize:"12px",color:T.muted2,marginTop:"8px"}}>📅 {c.date}</div>
                  </div>
                </EditableCard>
              ))}
            </div>
          </div>
        )}

        {/* EVENTS */}
        {tab==="events"&&(
          <div>
            <SectionHeader title="Events & Bookings" section="events"/>
            {adding==="events"&&<AddForm section="events" defaults={DEFAULTS.events} onSave={item=>addItem("events",item)} onCancel={()=>setAdding(null)}/>}
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              {data.events.sort((a,b)=>new Date(a.date)-new Date(b.date)).map(e=>(
                <EditableCard key={e.id} onEdit={()=>openModal("events",e)} style={{display:"flex",gap:"16px",alignItems:"center"}}>
                  <div style={{minWidth:"52px",textAlign:"center",background:T.surf2,borderRadius:"8px",padding:"8px",flexShrink:0}}>
                    <div style={{fontSize:"22px",fontWeight:900,color:T.accent,lineHeight:1}}>{new Date(e.date).getDate()}</div>
                    <div style={{fontSize:"10px",color:T.muted2}}>{new Date(e.date).toLocaleString("de-DE",{month:"short"})}</div>
                  </div>
                  <div style={{flex:1,paddingRight:"80px"}}>
                    <div style={{fontSize:"15px",fontWeight:700}}>{e.name}</div>
                    <div style={{fontSize:"12px",color:T.muted2}}>{e.venue} · {e.type}</div>
                    {e.notes&&<div style={{fontSize:"12px",color:T.muted2,marginTop:"3px"}}>{e.notes}</div>}
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <Badge v={e.status} c={STATUS_C[e.status]}/>
                    {e.fee>0&&<div style={{fontSize:"13px",color:T.accent,fontWeight:700,marginTop:"6px"}}>€{e.fee}</div>}
                  </div>
                </EditableCard>
              ))}
            </div>
          </div>
        )}

        {/* PITCHING */}
        {tab==="pitching"&&(
          <div>
            <SectionHeader title="Pitching & Opportunities" section="pitching"/>
            {adding==="pitching"&&<AddForm section="pitching" defaults={DEFAULTS.pitching} onSave={item=>addItem("pitching",item)} onCancel={()=>setAdding(null)}/>}
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              {data.pitching.map(p=>(
                <EditableCard key={p.id} onEdit={()=>openModal("pitching",p)} style={{display:"flex",gap:"14px",alignItems:"center"}}>
                  <Badge v={p.type} c={T.purple}/>
                  <div style={{flex:1,paddingRight:"80px"}}>
                    <div style={{fontSize:"15px",fontWeight:700}}>{p.target}</div>
                    <div style={{fontSize:"12px",color:T.muted2}}>{p.release} · Deadline: {p.deadline||"–"}</div>
                    {p.notes&&<div style={{fontSize:"12px",color:T.muted2,marginTop:"3px"}}>{p.notes}</div>}
                  </div>
                  <Badge v={p.status} c={STATUS_C[p.status]}/>
                </EditableCard>
              ))}
            </div>
          </div>
        )}

        {/* FINANZEN */}
        {tab==="finanzen"&&(
          <div style={{display:"flex",flexDirection:"column",gap:"18px"}}>
            <div style={g3}>
              {[
                {l:"Einnahmen real",v:totalEin,c:T.accent},
                {l:"Ausgaben real",v:totalAus,c:T.red},
                {l:"Netto real",v:totalEin-totalAus,c:totalEin-totalAus>=0?T.accent:T.red},
              ].map(x=>(
                <div key={x.l} style={card}><div style={{fontSize:"11px",color:T.muted2}}>{x.l}</div><div style={{fontSize:"28px",fontWeight:900,color:x.c}}>€{x.v}</div></div>
              ))}
              <div style={{...card,border:`1px solid ${T.yellow}44`,gridColumn:"1/-1"}}>
                <div style={{fontSize:"11px",color:T.muted2,marginBottom:"14px",letterSpacing:"2px",textTransform:"uppercase"}}>📊 Geplante Cashflows</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"16px"}}>
                  <div><div style={{fontSize:"11px",color:T.muted2}}>🎤 Event-Gagen (bestätigt)</div><div style={{fontSize:"22px",fontWeight:800,color:"#88CC00"}}>+€{eventFeesConfirmed}</div></div>
                  <div><div style={{fontSize:"11px",color:T.muted2}}>⏳ Event-Gagen (ausstehend)</div><div style={{fontSize:"22px",fontWeight:800,color:T.yellow}}>+€{eventFeesPending}</div></div>
                  <div><div style={{fontSize:"11px",color:T.muted2}}>🎵 Release-Budgets (geblockt)</div><div style={{fontSize:"22px",fontWeight:800,color:T.red}}>-€{budgetBlocked}</div></div>
                  <div><div style={{fontSize:"11px",color:T.muted2}}>🔮 Forecast (bestätigt)</div><div style={{fontSize:"22px",fontWeight:800,color:totalEin+eventFeesConfirmed-totalAus-budgetBlocked>=0?T.accent:T.red}}>€{totalEin+eventFeesConfirmed-totalAus-budgetBlocked}</div></div>
                </div>
                <div style={{marginTop:"14px",display:"flex",flexDirection:"column",gap:"6px"}}>
                  {eventFees.map(e=>(
                    <div key={e.id} style={{display:"flex",alignItems:"center",gap:"10px",fontSize:"12px",padding:"6px 0",borderBottom:`1px solid ${T.border}`}}>
                      <span style={{color:T.muted2}}>🎤</span>
                      <span style={{flex:1,fontWeight:600}}>{e.name}</span>
                      <span style={{color:T.muted2}}>{e.date}</span>
                      <span style={{background:(e.status==="confirmed"?"#88CC00":T.yellow)+"22",color:e.status==="confirmed"?"#88CC00":T.yellow,fontSize:"10px",padding:"2px 7px",borderRadius:"4px",fontWeight:700}}>{e.status}</span>
                      <span style={{fontWeight:700,color:e.status==="confirmed"?"#88CC00":T.yellow}}>+€{e.fee}</span>
                    </div>
                  ))}
                  {releaseBudgets.map(r=>(
                    <div key={r.id} style={{display:"flex",alignItems:"center",gap:"10px",fontSize:"12px",padding:"6px 0",borderBottom:`1px solid ${T.border}`}}>
                      <span style={{color:T.muted2}}>🎵</span>
                      <span style={{flex:1,fontWeight:600}}>{r.title}</span>
                      <span style={{color:T.muted2}}>{r.releaseDate}</span>
                      <span style={{background:T.yellow+"22",color:T.yellow,fontSize:"10px",padding:"2px 7px",borderRadius:"4px",fontWeight:700}}>budget geblockt</span>
                      <span style={{fontWeight:700,color:T.red}}>-€{r.budget}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div style={g2}>
              <div style={card}>
                <div style={secTitle}>💰 Einnahmen</div>
                {data.finanzen.einnahmen.map(e=>(
                  <EditableRow key={e.id} onEdit={()=>openModal("finanzen_ein",e)}>
                    <div style={{flex:1}}><div style={{fontSize:"13px",fontWeight:600}}>{e.quelle}</div><div style={{fontSize:"11px",color:T.muted2}}>{e.datum} · {e.kategorie}</div></div>
                    <div style={{fontSize:"15px",fontWeight:700,color:T.accent,flexShrink:0}}>+€{e.betrag}</div>
                  </EditableRow>
                ))}
                {adding==="finanzen_ein"&&<AddForm section="finanzen_ein" defaults={DEFAULTS.finanzen_ein} onSave={item=>addItem("finanzen_ein",item)} onCancel={()=>setAdding(null)}/>}
                <Btn onClick={()=>setAdding("finanzen_ein")} style={{marginTop:"12px"}}>+ Einnahme</Btn>
              </div>
              <div style={card}>
                <div style={secTitle}>💸 Ausgaben</div>
                {data.finanzen.ausgaben.map(a=>(
                  <EditableRow key={a.id} onEdit={()=>openModal("finanzen_aus",a)}>
                    <div style={{flex:1}}><div style={{fontSize:"13px",fontWeight:600}}>{a.posten}</div><div style={{fontSize:"11px",color:T.muted2}}>{a.datum} · {a.kategorie}</div></div>
                    <div style={{fontSize:"15px",fontWeight:700,color:T.red,flexShrink:0}}>-€{a.betrag}</div>
                  </EditableRow>
                ))}
                {adding==="finanzen_aus"&&<AddForm section="finanzen_aus" defaults={DEFAULTS.finanzen_aus} onSave={item=>addItem("finanzen_aus",item)} onCancel={()=>setAdding(null)}/>}
                <Btn onClick={()=>setAdding("finanzen_aus")} style={{marginTop:"12px"}}>+ Ausgabe</Btn>
              </div>
            </div>
          </div>
        )}

        {/* KONTAKTE */}
        {tab==="kontakte"&&(
          <div>
            <SectionHeader title="Kontakte & Netzwerk" section="kontakte"/>
            {adding==="kontakte"&&<AddForm section="kontakte" defaults={DEFAULTS.kontakte} onSave={item=>addItem("kontakte",item)} onCancel={()=>setAdding(null)}/>}
            <div style={g2}>
              {data.kontakte.map(k=>(
                <EditableCard key={k.id} onEdit={()=>openModal("kontakte",k)}>
                  <div style={{paddingRight:"80px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div><div style={{fontSize:"15px",fontWeight:700}}>{k.name}</div><div style={{fontSize:"12px",color:T.accent,marginTop:"2px"}}>{k.rolle}</div></div>
                      <Badge v={k.status} c={STATUS_C[k.status]}/>
                    </div>
                    <div style={{marginTop:"10px",display:"flex",flexDirection:"column",gap:"3px"}}>
                      {k.mail&&k.mail!=="-"&&<div style={{fontSize:"12px",color:T.muted2}}>✉️ {k.mail}</div>}
                      {k.tel&&k.tel!=="-"&&<div style={{fontSize:"12px",color:T.muted2}}>📞 {k.tel}</div>}
                      {k.notiz&&<div style={{fontSize:"12px",color:T.muted2,marginTop:"4px"}}>💬 {k.notiz}</div>}
                    </div>
                  </div>
                </EditableCard>
              ))}
            </div>
          </div>
        )}

        {/* ZIELE */}
        {tab==="ziele"&&(
          <div>
            <SectionHeader title="Ziele & Vision" section="ziele"/>
            {adding==="ziele"&&<AddForm section="ziele" defaults={DEFAULTS.ziele} onSave={item=>addItem("ziele",item)} onCancel={()=>setAdding(null)}/>}
            <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
              {data.ziele.map(z=>(
                <div key={z.id} style={card}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"16px",fontWeight:800}}>{z.ziel}</div>
                      <div style={{display:"flex",gap:"8px",marginTop:"5px"}}>
                        <Badge v={z.kategorie} c={T.blue}/>

                      </div>
                    </div>
                    <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
                      <span style={{fontSize:"28px",fontWeight:900,color:T.accent}}>{z.progress}%</span>
                      <Btn color="ghost" onClick={()=>openModal("ziele",z)} style={{padding:"5px 10px",fontSize:"13px"}}>✏️</Btn>
                    </div>
                  </div>
                  <PBar pct={z.progress}/>
                  <div style={{display:"flex",alignItems:"center",gap:"10px",marginTop:"10px"}}>
                    <span style={{fontSize:"11px",color:T.muted2}}>Progress:</span>
                    <input type="range" min="0" max="100" value={z.progress} onChange={e=>setZP(z.id,e.target.value)} style={{flex:1}}/>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* TASKS */}
        {tab==="tasks"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px"}}>
              <div>
                <h2 style={{margin:0,fontSize:"18px",fontWeight:900}}>Task Board</h2>
                <div style={{fontSize:"12px",color:T.muted2,marginTop:"3px"}}>{data.tasks.filter(t=>t.done).length}/{data.tasks.length} erledigt</div>
              </div>
              <div style={{display:"flex",gap:"8px"}}>
                <FilterBtns value={taskFilter} onChange={setTaskFilter}/>
                <Btn onClick={()=>setAdding("tasks")}>+ Add Task</Btn>
              </div>
            </div>
            {adding==="tasks"&&<AddForm section="tasks" defaults={DEFAULTS.tasks} onSave={item=>addItem("tasks",item)} onCancel={()=>setAdding(null)}/>}
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {data.tasks.filter(t=>taskFilter==="open"?!t.done:taskFilter==="done"?t.done:true).map(t=>(
                <div key={t.id} style={{...card,display:"flex",alignItems:"center",gap:"14px",padding:"14px 20px",opacity:t.done?.6:1}}>
                  <input type="checkbox" checked={t.done} onChange={()=>toggleTask(t.id)} style={{width:"18px",height:"18px",cursor:"pointer",flexShrink:0}}/>
                  <div style={{flex:1,fontSize:"14px",textDecoration:t.done?"line-through":"none",color:t.done?T.muted:T.text}}>{t.task}</div>
                  <Badge v={t.kategorie} c={T.blue}/>
                  <Badge v={t.priority} c={PRIO_C[t.priority]}/>
                  <button onClick={()=>openModal("tasks",t)} style={{background:"none",border:"none",color:T.muted2,cursor:"pointer",fontSize:"16px",padding:"4px"}}>✏️</button>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* DOCS */}
        {tab==="docs"&&(
          <div>
            <SectionHeader title="Dokumente & Dateien" section="docs"/>
            {adding==="docs"&&<AddForm section="docs" defaults={DEFAULTS.docs} onSave={item=>addItem("docs",item)} onCancel={()=>setAdding(null)}/>}
            <div style={g2}>
              {data.docs.map(d=>(
                <EditableCard key={d.id} onEdit={()=>openModal("docs",d)} style={{display:"flex",alignItems:"center",gap:"16px"}}>
                  <div style={{background:T.surf3,borderRadius:"8px",padding:"10px 14px",fontSize:"12px",fontWeight:700,color:T.accent,minWidth:"48px",textAlign:"center",flexShrink:0}}>{d.typ}</div>
                  <div style={{flex:1,paddingRight:"60px"}}>
                    <div style={{fontSize:"14px",fontWeight:700}}>{d.name}</div>
                    <div style={{fontSize:"12px",color:T.muted2,marginTop:"3px"}}>{d.datum}</div>
                    {d.url&&<div style={{fontSize:"11px",color:T.blue,marginTop:"2px",wordBreak:"break-all"}}>{d.url}</div>}
                  </div>
                  <Badge v={d.status} c={STATUS_C[d.status]}/>
                </EditableCard>
              ))}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
