const LS_KEY = "artist_hq_v2";

async function sbSave(data) {
  localStorage.setItem(LS_KEY, JSON.stringify(data));
  try {
    const r = await fetch(SB_URL+"/rest/v1/artist_hq", {method:"POST",headers:HDR,body:JSON.stringify({id:1,data:JSON.stringify(data),updated_at:new Date().toISOString()})});
    return r.ok;
  } catch(e) { return false; }
}
async function sbLoad() {
  try {
    const r = await fetch(SB_URL+"/rest/v1/artist_hq?id=eq.1&select=data",{headers:HDR});
    if(r.ok){const rows=await r.json();if(rows[0]?.data&&rows[0].data!=='{}')return JSON.parse(rows[0].data);}
  } catch(e){}
  const l=localStorage.getItem(LS_KEY);
  return l?JSON.parse(l):null;
}

function Modal({section,item,onSave,onDel,onClose}){
  const [d,setD]=useState({...item});
  const fs=FIELDS[section]||[];
  return h('div',{onClick:onClose,style:{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}},
    h('div',{onClick:e=>e.stopPropagation(),style:{background:T.surf,border:`2px solid ${T.accent}55`,borderRadius:"16px",padding:"28px",width:"540px",maxWidth:"95vw",maxHeight:"88vh",overflowY:"auto"}},

        h('div',{style:{fontSize:"16px",fontWeight:800,color:T.accent}},"✏️ Bearbeiten"),
        h('button',{onClick:onClose,style:{background:"none",border:"none",color:T.muted2,fontSize:"24px",cursor:"pointer"}},"×")
      ),
      h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px",marginBottom:"20px"}},
        fs.map(f=>h('div',{key:f.k,style:{gridColumn:f.w?"1/-1":"auto"}},
          h('div',{style:{fontSize:"11px",color:T.muted2,marginBottom:"5px",textTransform:"uppercase"}},f.l),
          f.t==="sel"
            ?h(Sel,{value:d[f.k]??"",onChange:e=>setD(p=>({...p,[f.k]:e.target.value}))},f.o.map(o=>h('option',{key:o,value:o},o)))
            :h(Inp,{type:f.t,value:d[f.k]??"",onChange:e=>setD(p=>({...p,[f.k]:f.t==="number"?Number(e.target.value):e.target.value}))})
        ))
      ),
      h('div',{style:{display:"flex",justifyContent:"space-between"}},
        h(Btn,{col:"red",onClick:()=>{onDel(item.id);onClose();}},"🗑 Löschen"),
        h('div',{style:{display:"flex",gap:"8px"}},
          h(Btn,{col:"ghost",onClick:onClose},"Abbrechen"),
          h(Btn,{onClick:()=>{onSave(d);onClose();}},"Speichern")
        )
      )
    )
  );
}

      ))

function ECard({children,onEdit,style:s={}}){

  );
}
function ERow({children,onEdit}){

  return h('div',{onClick:onEdit,onMouseEnter:()=>setHov(true),onMouseLeave:()=>setHov(false),style:{display:"flex",alignItems:"center",gap:"12px",padding:"10px 6px",borderBottom:`1px solid ${T.border}`,cursor:"pointer",background:hov?T.surf2:"transparent",borderRadius:"6px",margin:"0 -6px"}},

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const [data,setData]=useState(INIT);
  const [tab,setTab]=useState("overview");
  const [modal,setModal]=useState(null);
  const [adding,setAdding]=useState(null);
  const [taskFilter,setTaskFilter]=useState("open");
  const [saveStatus,setSaveStatus]=useState("");
  const [loaded,setLoaded]=useState(false);
  const [editArtist,setEditArtist]=useState(false);
  const [artistDraft,setArtistDraft]=useState(INIT.artist);
  const saveTimer=useRef(null);

  useEffect(()=>{
    sbLoad().then(saved=>{if(saved)setData(saved);setLoaded(true);});
  },[]);

  useEffect(()=>{
    if(!loaded)return;
    setSaveStatus("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      sbSave(data).then(ok=>setSaveStatus(ok?"saved":"local")).catch(()=>setSaveStatus("local"));
    },800);
  },[data,loaded]);

  const upd=(k,fn)=>setData(d=>({...d,[k]:fn(d[k])}));
  const saveItem=(sec,draft)=>{
    if(sec==="finanzen_ein")setData(d=>({...d,finanzen:{...d.finanzen,einnahmen:d.finanzen.einnahmen.map(x=>x.id===draft.id?draft:x)}}));
    else if(sec==="finanzen_aus")setData(d=>({...d,finanzen:{...d.finanzen,ausgaben:d.finanzen.ausgaben.map(x=>x.id===draft.id?draft:x)}}));
    else upd(sec,arr=>arr.map(x=>x.id===draft.id?draft:x));
  };
  const delItem=(sec,id)=>{
    if(sec==="finanzen_ein")setData(d=>({...d,finanzen:{...d.finanzen,einnahmen:d.finanzen.einnahmen.filter(x=>x.id!==id)}}));
    else if(sec==="finanzen_aus")setData(d=>({...d,finanzen:{...d.finanzen,ausgaben:d.finanzen.ausgaben.filter(x=>x.id!==id)}}));
    else upd(sec,arr=>arr.filter(x=>x.id!==id));
  };
  const addItem=(sec,item)=>{
    if(sec==="finanzen_ein")setData(d=>({...d,finanzen:{...d.finanzen,einnahmen:[...d.finanzen.einnahmen,item]}}));
    else if(sec==="finanzen_aus")setData(d=>({...d,finanzen:{...d.finanzen,ausgaben:[...d.finanzen.ausgaben,item]}}));
    else upd(sec,arr=>[...arr,item]);
    setAdding(null);
  };
  const toggleTask=id=>upd("tasks",arr=>arr.map(t=>t.id===id?{...t,done:!t.done}:t));
  const setZP=(id,v)=>upd("ziele",arr=>arr.map(z=>z.id===id?{...z,progress:Number(v)}:z));

  const totalEin=data.finanzen.einnahmen.reduce((s,e)=>s+e.betrag,0);
  const totalAus=data.finanzen.ausgaben.reduce((s,e)=>s+e.betrag,0);
  const eventFees=data.events.filter(e=>e.fee>0&&e.status!=="cancelled");
  const eventConf=eventFees.filter(e=>e.status==="confirmed").reduce((s,e)=>s+Number(e.fee),0);
  const eventPend=eventFees.filter(e=>e.status!=="confirmed").reduce((s,e)=>s+Number(e.fee),0);
  const budgetBlocked=data.releases.filter(r=>r.status!=="released"&&r.budget>0).reduce((s,r)=>s+Number(r.budget),0);

  const g2={display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px"};
  const g3={display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"16px"};
  const g4={display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"14px"};
  const secT={fontSize:"11px",letterSpacing:"3px",color:T.muted2,textTransform:"uppercase",fontWeight:700,marginBottom:"14px"};
  const rowD={display:"flex",alignItems:"center",gap:"12px",padding:"10px 0",borderBottom:`1px solid ${T.border}`};

  const SH=({title,sec})=>h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px"}},
    h('h2',{style:{margin:0,fontSize:"18px",fontWeight:900}},title),
    h(Btn,{onClick:()=>setAdding(sec)},"+ Hinzufügen")
  );
  const FB=({val,onChange})=>h('div',{style:{display:"flex",gap:"5px"}},
    [["open","Offen"],["done","Erledigt"],["all","Alle"]].map(([v,l])=>
      h('button',{key:v,onClick:()=>onChange(v),style:{background:val===v?T.accent:"transparent",color:val===v?"#000":T.muted2,border:`1px solid ${val===v?T.accent:T.border}`,padding:"4px 10px",borderRadius:"6px",cursor:"pointer",fontSize:"11px",fontWeight:700}},l)
    )
  );
  const AF=({sec})=>adding===sec&&h(AddForm,{section:sec,defaults:DEFS[sec],onSave:item=>addItem(sec,item),onCancel:()=>setAdding(null)});

  return h(Fragment,null,
    modal&&h(Modal,{section:modal.sec,item:modal.item,onSave:d=>saveItem(modal.sec,d),onDel:id=>delItem(modal.sec,id),onClose:()=>setModal(null)}),

    // Header
    h('div',{style:{background:T.surf,borderBottom:`1px solid ${T.border}`,padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}},
      h('div',null,
        h('div',{style:{display:"flex",alignItems:"center",gap:"10px"}},
          h('div',{style:{fontSize:"10px",letterSpacing:"4px",color:T.accent,fontWeight:700}},"ARTIST HQ"),
          saveStatus==="saving"&&h('span',{style:{fontSize:"10px",color:T.muted2}},"⏳ speichert..."),
          saveStatus==="saved"&&h('span',{style:{fontSize:"10px",color:"#88CC00"}},"✓ gespeichert"),
          saveStatus==="local"&&h('span',{style:{fontSize:"10px",color:T.yellow}},"⚠ lokal gespeichert"),
        ),
        editArtist?h('div',{style:{display:"flex",gap:"8px",marginTop:"6px",flexWrap:"wrap"}},
          [["name","Name"],["genre","Genre"],["label","Label"],["listeners","Listeners"],["followers","Follower"],["streams","Streams"]].map(([k,ph])=>
            h(Inp,{key:k,style:{width:"110px"},placeholder:ph,value:artistDraft[k],onChange:e=>setArtistDraft(d=>({...d,[k]:e.target.value}))})
          ),
